server.port=8080

# H2 Database Configuration (using a local persistent file)
spring.datasource.url=jdbc:h2:file:./gosafe_db;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Hibernate configuration
spring.jpa.hibernate.ddl-auto=update

# H2 Console Configuration (for easy database visualization)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=true

# JWT security configuration
gosafe.jwtSecret=gosafeSecretKeyJWTForAuthenticationNeedsToBeLongEnoughForHMAC256AndSecureEnoughForProductionUse!
gosafe.jwtExpirationMs=86400000

# File Upload Configuration
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB
